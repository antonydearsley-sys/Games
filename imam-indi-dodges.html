<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Imam Indi Dodges The Boys</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: #0a1a05;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Nunito', sans-serif;
    overflow: hidden;
  }
  .title-label {
    font-family: 'Bebas Neue', cursive;
    color: #88dd44;
    font-size: 16px;
    letter-spacing: 5px;
    margin-bottom: 10px;
    text-shadow: 0 0 16px rgba(100,220,40,0.8);
  }
  canvas {
    display: block;
    cursor: pointer;
    border-radius: 10px;
    box-shadow:
      0 0 0 2px rgba(80,180,30,0.4),
      0 0 40px rgba(60,160,20,0.4),
      0 0 80px rgba(30,100,10,0.2);
  }
  .hint {
    color: rgba(100,200,40,0.4);
    font-size: 11px;
    letter-spacing: 3px;
    margin-top: 10px;
    font-weight: 900;
    text-transform: uppercase;
  }
</style>
</head>
<body>
<div class="title-label">⛳ IMAM INDI DODGES THE BOYS ⛳</div>
<canvas id="c" width="420" height="620"></canvas>
<div class="hint">← → Arrow Keys or Tap Sides to Move</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 420, H = 620;

// ─── DIFFICULTY LEVELS ────────────────────────────────────────────────────────
const LEVELS = [
  { score:0,  label:'EASY',                  labelCol:'#44cc00', spawnInterval:90,  spdMult:1.0,  vxMult:0.5,  doubleChance:0.00, tripleChance:0.00 },
  { score:8,  label:'WARMING UP',             labelCol:'#88dd44', spawnInterval:72,  spdMult:1.3,  vxMult:0.9,  doubleChance:0.18, tripleChance:0.00 },
  { score:18, label:'GETTING SPICY 🌶',       labelCol:'#ffcc00', spawnInterval:55,  spdMult:1.7,  vxMult:1.4,  doubleChance:0.32, tripleChance:0.06 },
  { score:32, label:'THE BOYS ARE COMING 👦', labelCol:'#ff8800', spawnInterval:40,  spdMult:2.3,  vxMult:2.0,  doubleChance:0.48, tripleChance:0.18 },
  { score:50, label:'CHAOS MODE 😱',          labelCol:'#ff4400', spawnInterval:28,  spdMult:3.1,  vxMult:3.0,  doubleChance:0.60, tripleChance:0.32 },
  { score:72, label:'PINT STORM 🍺',          labelCol:'#ff2200', spawnInterval:18,  spdMult:4.2,  vxMult:4.2,  doubleChance:0.72, tripleChance:0.50 },
  { score:100,label:'IMPOSSIBLE 💀',          labelCol:'#ff0000', spawnInterval:11,  spdMult:5.8,  vxMult:5.8,  doubleChance:0.85, tripleChance:0.68 },
];

function getLevel(score) {
  let lv = LEVELS[0];
  for (const l of LEVELS) { if (score >= l.score) lv = l; }
  return lv;
}
function getLevelIdx(score) {
  let idx = 0;
  for (let i = 0; i < LEVELS.length; i++) { if (score >= LEVELS[i].score) idx = i; }
  return idx;
}

// ─── ENVIRONMENT ──────────────────────────────────────────────────────────────
const CLOUDS = Array.from({length:6}, (_, i) => ({
  x: i*80+Math.random()*40, y:25+Math.random()*55,
  w:70+Math.random()*60, speed:0.22+Math.random()*0.22
}));
const TREES = [
  {x:15,h:80},{x:48,h:100},{x:368,h:90},{x:396,h:70},
  {x:0,h:60},{x:408,h:85},{x:338,h:75},{x:175,h:65},{x:258,h:88}
];

// ─── STATE ────────────────────────────────────────────────────────────────────
let state = {};
function resetState() {
  state = {
    phase:'idle',
    px:W/2, py:H-100,
    frame:0, time:0,
    objects:[], objTimer:0,
    score:0, best:0,
    deathTimer:0,
    sparks:[], shards:[],
    keys:{left:false, right:false},
    walkFrame:0,
    levelFlash:0, levelFlashLabel:'', levelFlashCol:'#fff',
    screenShake:0,
    prevLevelIdx:0,
    combo:0, comboTimer:0,
  };
}
resetState();

const GROUND_Y = H - 70;
const PLAYER_W = 34, PLAYER_H = 60;

// ─── OBJECT TYPES ─────────────────────────────────────────────────────────────
const OBJ_TYPES = [
  {type:'golf',     r:10, baseSpd:3.5},
  {type:'tennis',   r:11, baseSpd:4.0},
  {type:'beer',     r:9,  baseSpd:4.5},
  {type:'somersby', r:9,  baseSpd:5.0},
  {type:'mate',     r:14, baseSpd:3.2},
];

function spawnOne() {
  const lv  = getLevel(state.score);
  const t   = OBJ_TYPES[Math.floor(Math.random()*OBJ_TYPES.length)];
  // continuous time-based speed bonus on top of level multiplier
  const timeMult = 1 + state.time * 0.00045;
  const spd = t.baseSpd * lv.spdMult * timeMult;
  state.objects.push({
    ...t,
    x: t.r + Math.random()*(W - t.r*2),
    y: -20 - Math.random()*40,
    vy: spd + Math.random()*1.8,
    vx: (Math.random()-0.5) * lv.vxMult * 2.8,
    rot: Math.random()*Math.PI*2,
    rotSpeed: (Math.random()-0.5)*0.20,
    wobble: Math.random()*Math.PI*2,
    passed: false,
  });
}

function trySpawn() {
  const lv = getLevel(state.score);
  spawnOne();
  if (Math.random() < lv.doubleChance) spawnOne();
  if (Math.random() < lv.tripleChance) spawnOne();
}

function spawnSparks(x, y, col) {
  for (let i=0; i<20; i++) {
    const a=Math.random()*Math.PI*2, s=Math.random()*6+1;
    state.sparks.push({
      x, y, vx:Math.cos(a)*s, vy:Math.sin(a)*s-3,
      life:1, r:Math.random()*4+1,
      color: col || ['#ff4400','#ffaa00','#ffff00','#fff'][Math.floor(Math.random()*4)]
    });
  }
}

function spawnShards(x, y) {
  for (let i=0; i<12; i++) {
    const a=Math.random()*Math.PI*2, s=Math.random()*5+2;
    state.shards.push({
      x, y, vx:Math.cos(a)*s, vy:Math.sin(a)*s-2,
      life:1, w:4+Math.random()*9, h:2+Math.random()*5,
      rot:Math.random()*Math.PI*2, rotSpeed:(Math.random()-0.5)*0.28,
      color:['#fff','#ccee22','#44aa00','#e8a060','#ffd700'][Math.floor(Math.random()*5)]
    });
  }
}

// ─── CONTROLS ─────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.code==='ArrowLeft'  || e.code==='KeyA') state.keys.left  = true;
  if (e.code==='ArrowRight' || e.code==='KeyD') state.keys.right = true;
  if (e.code==='Space' && state.phase==='idle') state.phase = 'playing';
  if (e.code==='Space' && state.phase==='dead' && state.deathTimer>60) {
    const b=state.best; resetState(); state.best=b;
  }
  if (['Space','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();
});
document.addEventListener('keyup', e => {
  if (e.code==='ArrowLeft'  || e.code==='KeyA') state.keys.left  = false;
  if (e.code==='ArrowRight' || e.code==='KeyD') state.keys.right = false;
});
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const rx = (e.touches[0].clientX - rect.left) * (W / rect.width);
  if (state.phase==='idle') { state.phase='playing'; return; }
  if (state.phase==='dead' && state.deathTimer>60) {
    const b=state.best; resetState(); state.best=b; return;
  }
  if (rx < W/2) state.keys.left=true; else state.keys.right=true;
}, {passive:false});
canvas.addEventListener('touchend', () => { state.keys.left=false; state.keys.right=false; });
canvas.addEventListener('click', () => {
  if (state.phase==='idle') state.phase='playing';
  if (state.phase==='dead' && state.deathTimer>60) {
    const b=state.best; resetState(); state.best=b;
  }
});

// ─── UPDATE ───────────────────────────────────────────────────────────────────
function update() {
  state.frame++;

  // Clouds speed up with danger
  const lvIdx = getLevelIdx(state.score);
  for (const c of CLOUDS) {
    c.x += c.speed + lvIdx * 0.15;
    if (c.x > W+c.w) c.x = -c.w;
  }

  if (state.phase==='dead')   { state.deathTimer++; updateParticles(); return; }
  if (state.phase!=='playing') return;

  state.time++;
  state.walkFrame += 0.15 + lvIdx*0.04;
  if (state.screenShake > 0) state.screenShake -= 0.6;
  if (state.levelFlash  > 0) state.levelFlash--;
  if (state.comboTimer  > 0) state.comboTimer--;
  else state.combo = 0;

  // Level-up detection
  const curIdx = getLevelIdx(state.score);
  if (curIdx > state.prevLevelIdx) {
    state.prevLevelIdx = curIdx;
    const lv = LEVELS[curIdx];
    state.levelFlash      = 100;
    state.levelFlashLabel = lv.label;
    state.levelFlashCol   = lv.labelCol;
    state.screenShake     = 14;
    spawnSparks(W/2, H/2, lv.labelCol);
  }

  // Player speed also scales
  const moveSpd = 4.2 + curIdx*0.5 + state.score*0.04;
  if (state.keys.left)  state.px = Math.max(PLAYER_W/2+5,  state.px - moveSpd);
  if (state.keys.right) state.px = Math.min(W-PLAYER_W/2-5, state.px + moveSpd);

  // Spawn objects — interval continuously shrinks with time too
  state.objTimer++;
  const lv = getLevel(state.score);
  const interval = Math.max(8, lv.spawnInterval - state.time * 0.025);
  if (state.objTimer >= interval) {
    state.objTimer = 0;
    trySpawn();
  }

  // Update objects
  for (const o of state.objects) {
    o.y  += o.vy;
    o.x  += o.vx;
    o.rot += o.rotSpeed;
    o.wobble += 0.06;
    // Gravity acceleration — objects get faster as they fall
    o.vy += 0.018;
    // Wall bounce
    if (o.x < o.r)   { o.x = o.r;   o.vx =  Math.abs(o.vx); }
    if (o.x > W-o.r) { o.x = W-o.r; o.vx = -Math.abs(o.vx); }
  }

  // Collision & scoring
  for (const o of state.objects) {
    const dx = o.x - state.px;
    const dy = o.y - (state.py - PLAYER_H*0.35);
    if (Math.sqrt(dx*dx+dy*dy) < o.r+12 && o.y > -5) {
      if (state.score > state.best) state.best = state.score;
      state.phase     = 'dead';
      state.deathTimer = 0;
      spawnSparks(state.px, state.py-PLAYER_H/2);
      spawnShards(state.px, state.py-PLAYER_H/2);
      state.screenShake = 22;
      return;
    }
    if (!o.passed && o.y > GROUND_Y+20) {
      o.passed = true;
      state.score++;
      state.combo++;
      state.comboTimer = 75;
    }
  }
  state.objects = state.objects.filter(o => o.y < H+60);

  updateParticles();
}

function updateParticles() {
  for (const sp of state.sparks) { sp.x+=sp.vx; sp.y+=sp.vy; sp.vy+=0.15; sp.life-=0.05; }
  state.sparks = state.sparks.filter(s => s.life>0);
  for (const sh of state.shards) { sh.x+=sh.vx; sh.y+=sh.vy; sh.vy+=0.12; sh.rot+=sh.rotSpeed; sh.life-=0.028; }
  state.shards = state.shards.filter(s => s.life>0);
}

// ─── DRAW HELPERS ─────────────────────────────────────────────────────────────
function drawGolfBall(x,y,r) {
  ctx.fillStyle='#fff'; ctx.shadowColor='#aaa'; ctx.shadowBlur=6;
  ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill(); ctx.shadowBlur=0;
  ctx.fillStyle='rgba(160,160,160,0.5)';
  for (let i=0;i<8;i++) {
    const a=(i/8)*Math.PI*2;
    ctx.beginPath(); ctx.arc(x+Math.cos(a)*r*0.55, y+Math.sin(a)*r*0.55, 1.5, 0, Math.PI*2); ctx.fill();
  }
  ctx.beginPath(); ctx.arc(x,y,1.5,0,Math.PI*2); ctx.fill();
}

function drawTennisBall(x,y,r,rot) {
  ctx.save(); ctx.translate(x,y); ctx.rotate(rot);
  ctx.fillStyle='#ccee22'; ctx.shadowColor='#aabb00'; ctx.shadowBlur=8;
  ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.fill(); ctx.shadowBlur=0;
  ctx.strokeStyle='#fff'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.arc(0,0,r,0.4,Math.PI-0.4); ctx.stroke();
  ctx.beginPath(); ctx.arc(0,0,r,Math.PI+0.4,-0.4); ctx.stroke();
  ctx.restore();
}

function drawBeerBottle(x,y,rot,isSomersby) {
  ctx.save(); ctx.translate(x,y); ctx.rotate(rot);
  const h=28, w=10;
  ctx.fillStyle=isSomersby?'#33aa00':'#228800';
  ctx.shadowColor='#00ff44'; ctx.shadowBlur=8;
  ctx.beginPath(); ctx.roundRect(-w/2,-h/2,w,h*0.7,[2,2,0,0]); ctx.fill();
  ctx.beginPath(); ctx.ellipse(0,h*0.1,w/2,h*0.22,0,0,Math.PI*2); ctx.fill();
  ctx.shadowBlur=0;
  ctx.fillStyle=isSomersby?'#88ee44':'#ffcc00';
  ctx.fillRect(-w/2+1,-4,w-2,10);
  ctx.fillStyle='#000'; ctx.font='bold 4px Nunito'; ctx.textAlign='center';
  ctx.fillText(isSomersby?'SOMERS':'BEER',0,3);
  ctx.fillStyle='#228800'; ctx.beginPath(); ctx.roundRect(-3,-h/2-8,6,10,2); ctx.fill();
  ctx.fillStyle='#cc0000'; ctx.beginPath(); ctx.roundRect(-4,-h/2-10,8,4,1); ctx.fill();
  ctx.restore();
}

function drawMate(x,y,wobble) {
  ctx.save(); ctx.translate(x,y);
  const b=Math.sin(wobble)*3;
  ctx.fillStyle='#4488ff'; ctx.beginPath(); ctx.roundRect(-10,-20+b,20,22,4); ctx.fill();
  ctx.strokeStyle='#4488ff'; ctx.lineWidth=6; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(-10,-16+b); ctx.lineTo(-18,-8+b+Math.sin(wobble*2)*4); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(10,-16+b);  ctx.lineTo(18,-8+b-Math.sin(wobble*2)*4);  ctx.stroke();
  ctx.strokeStyle='#223366'; ctx.lineWidth=6;
  ctx.beginPath(); ctx.moveTo(-5,2+b); ctx.lineTo(-7,14); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(5,2+b);  ctx.lineTo(7,14);  ctx.stroke();
  ctx.fillStyle='#e8a060'; ctx.shadowColor='#c08040'; ctx.shadowBlur=4;
  ctx.beginPath(); ctx.arc(0,-28+b,11,0,Math.PI*2); ctx.fill(); ctx.shadowBlur=0;
  ctx.fillStyle='#222'; ctx.beginPath(); ctx.arc(0,-34+b,11,Math.PI,Math.PI*2); ctx.fill();
  ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.arc(-4,-28+b,2.5,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(4,-28+b,2.5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#333';
  ctx.beginPath(); ctx.arc(-4,-28+b,1.3,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(4,-28+b,1.3,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#993300'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.arc(0,-25+b,4,0.2,Math.PI-0.2); ctx.stroke();
  ctx.fillStyle='#228800';
  ctx.beginPath(); ctx.roundRect(14,-10+b,5,14,1); ctx.fill();
  ctx.fillStyle='#ffcc00';
  ctx.beginPath(); ctx.roundRect(14,-6+b,5,6,0); ctx.fill();
  ctx.restore();
}

function drawImam(x,y,walkFrame,isDead) {
  ctx.save(); ctx.translate(x,y);
  if (isDead) ctx.rotate(Math.PI*0.25);
  const legSwing = isDead ? 0 : Math.sin(walkFrame)*14;
  const bob      = isDead ? 0 : Math.abs(Math.sin(walkFrame))*-3;

  ctx.fillStyle='rgba(0,0,0,0.18)';
  ctx.beginPath(); ctx.ellipse(0,2,18,5,0,0,Math.PI*2); ctx.fill();

  // Legs
  ctx.strokeStyle='#2a2a2a'; ctx.lineWidth=10; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(-7,-10+bob); ctx.lineTo(-9+legSwing*0.4,20); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(7,-10+bob);  ctx.lineTo(9-legSwing*0.4,20);  ctx.stroke();
  ctx.fillStyle='#111';
  ctx.beginPath(); ctx.ellipse(-9+legSwing*0.4,21,8,4, 0.1,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse( 9-legSwing*0.4,21,8,4,-0.1,0,Math.PI*2); ctx.fill();

  // Body — striped polo
  const bodyY = -38+bob;
  ctx.fillStyle='#f8f8f8'; ctx.shadowColor='#ccc'; ctx.shadowBlur=4;
  ctx.beginPath(); ctx.roundRect(-14,bodyY,28,30,4); ctx.fill(); ctx.shadowBlur=0;
  ctx.strokeStyle='#555'; ctx.lineWidth=2;
  for (let s=0;s<7;s++) {
    ctx.beginPath(); ctx.moveTo(-14,bodyY+4+s*4); ctx.lineTo(14,bodyY+4+s*4); ctx.stroke();
  }
  ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.moveTo(-6,bodyY); ctx.lineTo(0,bodyY+6); ctx.lineTo(6,bodyY); ctx.closePath(); ctx.fill();

  // Arms
  const armSwing = isDead ? 0 : Math.sin(walkFrame+Math.PI)*10;
  ctx.strokeStyle='#e8c890'; ctx.lineWidth=8; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(-13,bodyY+8); ctx.quadraticCurveTo(-22,bodyY+16+armSwing,-22,bodyY+24+armSwing); ctx.stroke();
  ctx.fillStyle='#c8904a'; ctx.beginPath(); ctx.arc(-22,bodyY+24+armSwing,5,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#e8c890'; ctx.lineWidth=8;
  ctx.beginPath(); ctx.moveTo(13,bodyY+8); ctx.quadraticCurveTo(22,bodyY+16-armSwing,22,bodyY+24-armSwing); ctx.stroke();
  ctx.fillStyle='#fff'; ctx.shadowColor='#aaa'; ctx.shadowBlur=4;
  ctx.beginPath(); ctx.arc(22,bodyY+24-armSwing,5.5,0,Math.PI*2); ctx.fill(); ctx.shadowBlur=0;
  ctx.fillStyle='rgba(0,0,0,0.35)';
  for (let k=0;k<3;k++) { ctx.beginPath(); ctx.arc(19+k*2,bodyY+22-armSwing,1,0,Math.PI*2); ctx.fill(); }

  // Neck + head
  ctx.fillStyle='#c8904a'; ctx.beginPath(); ctx.roundRect(-5,bodyY-7,10,9,2); ctx.fill();
  ctx.fillStyle='#c8904a'; ctx.shadowColor='#a06830'; ctx.shadowBlur=6;
  ctx.beginPath(); ctx.arc(0,bodyY-18,16,0,Math.PI*2); ctx.fill(); ctx.shadowBlur=0;

  // Hair
  ctx.fillStyle='#1a0d00';
  ctx.beginPath(); ctx.arc(0,bodyY-24,16,Math.PI,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(0,bodyY-22,15,8,0,Math.PI,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#2a1500'; ctx.lineWidth=1;
  for (let i=-4;i<=4;i+=2) {
    ctx.beginPath(); ctx.moveTo(i*1.5,bodyY-32); ctx.quadraticCurveTo(i*2,bodyY-26,i*1.2,bodyY-22); ctx.stroke();
  }
  ctx.fillStyle='#c8904a';
  ctx.beginPath(); ctx.ellipse(-14,bodyY-18,4,7,-0.2,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse( 14,bodyY-18,4,7, 0.2,0,Math.PI*2); ctx.fill();

  // Beard
  ctx.fillStyle='#1a0d00';
  ctx.beginPath(); ctx.moveTo(-12,bodyY-12); ctx.quadraticCurveTo(-14,bodyY-5,-10,bodyY-1);
  ctx.quadraticCurveTo(-4,bodyY+3,0,bodyY+4); ctx.quadraticCurveTo(4,bodyY+3,10,bodyY-1);
  ctx.quadraticCurveTo(14,bodyY-5,12,bodyY-12); ctx.lineTo(8,bodyY-14);
  ctx.quadraticCurveTo(0,bodyY-11,-8,bodyY-14); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#111';
  ctx.beginPath(); ctx.ellipse(-4,bodyY-13,5,2.5,-0.1,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse( 4,bodyY-13,5,2.5, 0.1,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#2a1500'; ctx.lineWidth=0.8;
  for (let i=-3;i<=3;i++) { ctx.beginPath(); ctx.moveTo(i*3,bodyY-10); ctx.lineTo(i*3.5,bodyY+2); ctx.stroke(); }

  // Eyes
  ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.ellipse(-5,bodyY-20,3.5,3.5,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse( 5,bodyY-20,3.5,3.5,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#5a2800';
  ctx.beginPath(); ctx.arc(-5,bodyY-20,2.2,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc( 5,bodyY-20,2.2,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#111';
  ctx.beginPath(); ctx.arc(-5,bodyY-20,1.2,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc( 5,bodyY-20,1.2,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.arc(-4,bodyY-21,0.8,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc( 6,bodyY-21,0.8,0,Math.PI*2); ctx.fill();

  // Grin + teeth
  ctx.strokeStyle='#8b4513'; ctx.lineWidth=2; ctx.lineCap='round';
  ctx.beginPath(); ctx.arc(0,bodyY-14,5,0.2,Math.PI-0.2); ctx.stroke();
  ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(0,bodyY-11,4,0,Math.PI); ctx.fill();
  ctx.fillStyle='rgba(220,130,80,0.3)';
  ctx.beginPath(); ctx.ellipse(-9,bodyY-17,4,3,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse( 9,bodyY-17,4,3,0,0,Math.PI*2); ctx.fill();

  // Gold earring
  ctx.fillStyle='#ffd700'; ctx.shadowColor='#ffd700'; ctx.shadowBlur=4;
  ctx.beginPath(); ctx.arc(15,bodyY-20,2,0,Math.PI*2); ctx.fill(); ctx.shadowBlur=0;

  ctx.restore();
}

function drawBackground(lvIdx) {
  // Sky shifts from calm blue → chaotic red/orange at high levels
  const sky = ctx.createLinearGradient(0,0,0,H*0.65);
  const skies = [
    ['#87ceeb','#d0f0d0'],
    ['#90d8ee','#c8f0c0'],
    ['#a8d8b0','#d8f0a0'],
    ['#c8d870','#e8e860'],
    ['#e8c040','#f8d820'],
    ['#f09030','#f8c020'],
    ['#d02808','#e83810'],
  ];
  const s = skies[Math.min(lvIdx, skies.length-1)];
  sky.addColorStop(0, s[0]); sky.addColorStop(1, s[1]);
  ctx.fillStyle=sky; ctx.fillRect(0,0,W,H*0.65);

  for (const c of CLOUDS) {
    ctx.fillStyle='rgba(255,255,255,0.88)'; ctx.shadowColor='#ccc'; ctx.shadowBlur=10;
    ctx.beginPath(); ctx.ellipse(c.x,c.y,c.w*0.5,22,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(c.x-c.w*0.2,c.y+8,c.w*0.3,16,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(c.x+c.w*0.2,c.y+6,c.w*0.35,18,0,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
  }
  for (const t of TREES) {
    ctx.fillStyle='#2d5a1b'; ctx.beginPath(); ctx.arc(t.x+15,H*0.62-t.h,22,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#1e3d12'; ctx.beginPath(); ctx.arc(t.x+15,H*0.62-t.h+10,18,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#3d7a24'; ctx.beginPath(); ctx.arc(t.x+15,H*0.62-t.h-8,15,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#5a3a1a'; ctx.fillRect(t.x+11,H*0.62-t.h+18,8,25);
  }
  const grass=ctx.createLinearGradient(0,H*0.6,0,H);
  grass.addColorStop(0,'#4a8c2a'); grass.addColorStop(0.3,'#5aaa30');
  grass.addColorStop(0.7,'#4a9020'); grass.addColorStop(1,'#3a7015');
  ctx.fillStyle=grass; ctx.fillRect(0,H*0.6,W,H*0.4);
  ctx.globalAlpha=0.1;
  for (let i=0;i<8;i++) {
    ctx.fillStyle=i%2===0?'#88cc44':'#339922';
    ctx.fillRect(i*(W/8),H*0.6,W/8,H*0.4);
  }
  ctx.globalAlpha=1;
  // Flag
  ctx.strokeStyle='#888'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(W*0.75,H*0.62); ctx.lineTo(W*0.75,H*0.52); ctx.stroke();
  ctx.fillStyle='#ff0000';
  ctx.beginPath(); ctx.moveTo(W*0.75,H*0.52); ctx.lineTo(W*0.75+18,H*0.555); ctx.lineTo(W*0.75,H*0.57); ctx.fill();
  ctx.fillStyle='rgba(0,0,0,0.3)';
  ctx.beginPath(); ctx.ellipse(W*0.75,H*0.62,8,3,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#3a7015'; ctx.fillRect(0,GROUND_Y,W,5);
}

// ─── MAIN DRAW ────────────────────────────────────────────────────────────────
function draw() {
  const f = state.frame;
  const lvIdx = state.phase==='playing'||state.phase==='dead' ? getLevelIdx(state.score) : 0;
  const lv    = LEVELS[lvIdx];

  // Screen shake offset
  let sx=0, sy=0;
  if (state.screenShake>0) { sx=(Math.random()-0.5)*state.screenShake; sy=(Math.random()-0.5)*state.screenShake; }
  ctx.save(); ctx.translate(sx,sy);

  drawBackground(lvIdx);

  // Danger vignette at high levels
  if (lvIdx >= 3) {
    const vAlpha = Math.min(0.38,(lvIdx-3)*0.09 + Math.sin(f*0.06)*0.03);
    const vig = ctx.createRadialGradient(W/2,H/2,H*0.2,W/2,H/2,H*0.8);
    vig.addColorStop(0,'rgba(0,0,0,0)');
    vig.addColorStop(1,`rgba(200,30,0,${vAlpha})`);
    ctx.fillStyle=vig; ctx.fillRect(0,0,W,H);
  }

  // Object ground shadows
  for (const o of state.objects) {
    ctx.globalAlpha=0.07; ctx.fillStyle='#000';
    ctx.beginPath(); ctx.ellipse(o.x,GROUND_Y-2,o.r*1.5,4,0,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;

  // Objects
  for (const o of state.objects) {
    if (o.type==='golf') {
      drawGolfBall(o.x,o.y,o.r);
      ctx.globalAlpha=0.12; ctx.fillStyle='#fff';
      ctx.beginPath(); ctx.arc(o.x,o.y-o.r*1.5,o.r*0.7,0,Math.PI*2); ctx.fill();
      ctx.globalAlpha=1;
    } else if (o.type==='tennis')                    drawTennisBall(o.x,o.y,o.r,o.rot);
    else if (o.type==='beer'||o.type==='somersby')   drawBeerBottle(o.x,o.y,o.rot,o.type==='somersby');
    else if (o.type==='mate')                        drawMate(o.x,o.y,o.wobble);
  }

  // Particles
  for (const sp of state.sparks) {
    ctx.globalAlpha=sp.life; ctx.fillStyle=sp.color;
    ctx.shadowColor=sp.color; ctx.shadowBlur=10;
    ctx.beginPath(); ctx.arc(sp.x,sp.y,sp.r,0,Math.PI*2); ctx.fill(); ctx.shadowBlur=0;
  }
  for (const sh of state.shards) {
    ctx.save(); ctx.globalAlpha=sh.life; ctx.translate(sh.x,sh.y); ctx.rotate(sh.rot);
    ctx.fillStyle=sh.color; ctx.fillRect(-sh.w/2,-sh.h/2,sh.w,sh.h);
    ctx.restore();
  }
  ctx.globalAlpha=1;

  if (state.phase!=='idle') drawImam(state.px,state.py,state.walkFrame,state.phase==='dead');

  // ── HUD ──
  ctx.font="bold 28px 'Bebas Neue',cursive"; ctx.textAlign='left';
  ctx.fillStyle='rgba(0,0,0,0.3)'; ctx.fillText('SCORE: '+state.score,17,37);
  ctx.fillStyle='#fff'; ctx.shadowColor='#228800'; ctx.shadowBlur=10;
  ctx.fillText('SCORE: '+state.score,15,35); ctx.shadowBlur=0;

  ctx.textAlign='right';
  ctx.fillStyle='rgba(0,0,0,0.3)'; ctx.fillText('BEST: '+state.best,W-13,37);
  ctx.fillStyle='#ffd700'; ctx.shadowColor='#aa8800'; ctx.shadowBlur=8;
  ctx.fillText('BEST: '+state.best,W-15,35); ctx.shadowBlur=0;

  if (state.phase==='playing') {
    // Level label
    ctx.textAlign='center';
    ctx.font="bold 13px 'Bebas Neue',cursive";
    ctx.fillStyle=lv.labelCol; ctx.shadowColor=lv.labelCol; ctx.shadowBlur=8;
    ctx.fillText('LVL '+(lvIdx+1)+': '+lv.label,W/2,35); ctx.shadowBlur=0;

    // Progress bar to next level
    const nextScore = lvIdx<LEVELS.length-1 ? LEVELS[lvIdx+1].score : lv.score+30;
    const pct = Math.min(1,(state.score-lv.score)/(nextScore-lv.score));
    const bx=W/2-60, by=40, bw=120, bh=5;
    ctx.fillStyle='rgba(0,0,0,0.3)'; ctx.beginPath(); ctx.roundRect(bx,by,bw,bh,2); ctx.fill();
    const barCol = lvIdx<3?'#88dd44':lvIdx<5?'#ff8800':'#ff2200';
    ctx.fillStyle=barCol; ctx.shadowColor=barCol; ctx.shadowBlur=5;
    ctx.beginPath(); ctx.roundRect(bx,by,bw*pct,bh,2); ctx.fill(); ctx.shadowBlur=0;

    // Combo display
    if (state.combo>2 && state.comboTimer>0) {
      ctx.textAlign='right';
      ctx.font="bold 20px 'Bebas Neue',cursive";
      ctx.fillStyle='#ffdd00'; ctx.shadowColor='#ff8800'; ctx.shadowBlur=12;
      ctx.fillText('x'+state.combo+' COMBO! 🔥',W-14,60); ctx.shadowBlur=0;
    }
  }

  // Level-up flash overlay
  if (state.levelFlash>0) {
    const a = Math.min(1,state.levelFlash/25) * 0.88;
    const pulse = Math.abs(Math.sin(state.levelFlash*0.18));
    ctx.globalAlpha=a*pulse;
    ctx.fillStyle='rgba(0,0,0,0.55)'; ctx.fillRect(0,H*0.38,W,110);
    ctx.font="bold 36px 'Bebas Neue',cursive";
    ctx.textAlign='center'; ctx.fillStyle=state.levelFlashCol;
    ctx.shadowColor=state.levelFlashCol; ctx.shadowBlur=28;
    ctx.fillText('⚡ '+state.levelFlashLabel+' ⚡',W/2,H*0.38+68);
    ctx.shadowBlur=0; ctx.globalAlpha=1;
  }

  ctx.restore(); // end screen shake

  // ── IDLE SCREEN ──
  if (state.phase==='idle') {
    ctx.fillStyle='rgba(0,20,0,0.58)'; ctx.fillRect(0,0,W,H);
    drawImam(W/2,H*0.72,f*0.15,false);
    ctx.textAlign='center';
    ctx.font="bold 44px 'Bebas Neue',cursive";
    ctx.fillStyle='#fff'; ctx.shadowColor='#228800'; ctx.shadowBlur=22;
    ctx.fillText('IMAM INDI',W/2,116);
    ctx.font="bold 26px 'Bebas Neue',cursive";
    ctx.fillStyle='#88dd44'; ctx.shadowColor='#006600'; ctx.shadowBlur=14;
    ctx.fillText('DODGES THE BOYS',W/2,152); ctx.shadowBlur=0;
    ctx.font="bold 12px 'Nunito',sans-serif";
    ctx.fillStyle='rgba(200,255,160,0.7)';
    ctx.fillText('⛳ Golf  🎾 Tennis  🍺 Beer  🍾 Somersby  👦 The Boys',W/2,176);
    ctx.fillStyle='rgba(255,220,80,0.8)';
    ctx.fillText('🔥 Gets FASTER & HARDER every few dodges!',W/2,196);
    const pulse=Math.sin(f*0.08)*0.25+0.75;
    ctx.globalAlpha=pulse; ctx.fillStyle='#fff';
    ctx.font="700 17px 'Nunito',sans-serif";
    ctx.fillText('TAP or PRESS SPACE to START',W/2,224); ctx.globalAlpha=1;
    ctx.font="700 12px 'Nunito',sans-serif";
    ctx.fillStyle='rgba(150,220,80,0.6)';
    ctx.fillText('← → Arrow Keys or Tap Sides to Dodge',W/2,248);
    if (state.best>0) {
      ctx.fillStyle='#ffd700'; ctx.shadowColor='#aa8800'; ctx.shadowBlur=10;
      ctx.font="700 16px 'Nunito',sans-serif";
      ctx.fillText('🏆 BEST: '+state.best,W/2,278); ctx.shadowBlur=0;
    }
  }

  // ── DEAD SCREEN ──
  if (state.phase==='dead' && state.deathTimer>30) {
    ctx.fillStyle='rgba(0,10,0,0.8)';
    ctx.beginPath(); ctx.roundRect(38,150,344,295,14); ctx.fill();
    ctx.strokeStyle='rgba(100,220,40,0.4)'; ctx.lineWidth=2;
    ctx.shadowColor='#44aa00'; ctx.shadowBlur=14; ctx.stroke(); ctx.shadowBlur=0;

    ctx.textAlign='center';
    ctx.font="bold 34px 'Bebas Neue',cursive";
    ctx.fillStyle='#ff4400'; ctx.shadowColor='#ff0000'; ctx.shadowBlur=18;
    ctx.fillText('THE BOYS GOT HIM! 😂',W/2,200); ctx.shadowBlur=0;

    const lvReached = LEVELS[getLevelIdx(state.score)];
    ctx.font="700 13px 'Nunito',sans-serif";
    ctx.fillStyle='#ccff88';
    ctx.fillText('Reached: '+lvReached.label,W/2,224);

    ctx.font="bold 26px 'Nunito',sans-serif";
    ctx.fillStyle='#fff'; ctx.fillText('Score: '+state.score,W/2,262);
    ctx.fillStyle='#ffd700'; ctx.shadowColor='#aa8800'; ctx.shadowBlur=8;
    ctx.fillText('🏆 Best: '+state.best,W/2,296); ctx.shadowBlur=0;

    if (state.score>0 && state.score===state.best) {
      ctx.fillStyle='#ffdd00'; ctx.font="700 14px 'Nunito',sans-serif";
      ctx.fillText('🎉 NEW HIGH SCORE! 🎉',W/2,322);
    }

    // Difficulty hint on death
    const nextLvIdx = Math.min(getLevelIdx(state.score)+1, LEVELS.length-1);
    if (nextLvIdx > getLevelIdx(state.score)) {
      ctx.fillStyle='rgba(255,180,80,0.7)'; ctx.font="700 12px 'Nunito',sans-serif";
      ctx.fillText('Next level up at '+LEVELS[nextLvIdx].score+' dodges: '+LEVELS[nextLvIdx].label,W/2,346);
    }

    if (state.deathTimer>60) {
      const p2=Math.sin(f*0.1)*0.25+0.75;
      ctx.globalAlpha=p2; ctx.fillStyle='#88dd44';
      ctx.font="700 15px 'Nunito',sans-serif";
      ctx.fillText('TAP / SPACE TO TRY AGAIN ⛳',W/2,415); ctx.globalAlpha=1;
    }
  }
}

function loop() { update(); draw(); requestAnimationFrame(loop); }
loop();
</script>
