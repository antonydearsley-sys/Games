<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ellis Skates</title>
<link href="https://fonts.googleapis.com/css2?family=Righteous&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: radial-gradient(ellipse at top, #010a05 0%, #020c08 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Nunito', sans-serif;
    overflow: hidden;
  }
  .title-label {
    font-family: 'Righteous', cursive;
    color: #00ff88;
    font-size: 17px;
    letter-spacing: 6px;
    margin-bottom: 12px;
    text-shadow: 0 0 20px rgba(0,255,136,0.9), 0 0 40px rgba(0,180,80,0.5);
  }
  canvas {
    display: block;
    cursor: pointer;
    border-radius: 10px;
    box-shadow:
      0 0 0 2px rgba(0,255,136,0.35),
      0 0 40px rgba(0,200,100,0.45),
      0 0 80px rgba(0,120,60,0.25);
  }
  .hint {
    color: rgba(0,255,136,0.35);
    font-size: 12px;
    letter-spacing: 3px;
    margin-top: 12px;
    font-weight: 900;
    text-transform: uppercase;
  }
</style>
</head>
<body>
<div class="title-label">★ ELLIS SKATES ★</div>
<canvas id="c" width="420" height="620"></canvas>
<div class="hint">Space / Click to Jump</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 420, H = 620;

// Snowflakes
const SNOWFLAKES = Array.from({length: 60}, () => ({
  x: Math.random()*W, y: Math.random()*H,
  r: Math.random()*2.2+0.4,
  speed: Math.random()*0.65+0.15,
  drift: (Math.random()-0.5)*0.35,
  alpha: Math.random()*0.5+0.15
}));

// Crowd
const CROWD = Array.from({length: 45}, (_, i) => ({
  x: (i * 10) % W,
  y: H * 0.50 + Math.sin(i * 2.1) * 7,
  h: 11 + Math.random()*10,
  w: 7 + Math.random()*5
}));

let state = {};
function resetState() {
  state = {
    phase: 'idle',
    cy: H - 140, cvy: 0,
    frame: 0,
    obstacles: [], obstTimer: 0,
    score: 0, best: 0,
    deathTimer: 0,
    sparks: [], iceTrail: [],
    crowdWave: 0,
  };
}
resetState();

const GRAVITY = 0.40;
const JUMP = -9.2;
const OBS_W = 54;
const OBS_GAP = 160;
const OBS_SPD = 2.8;
const OBS_EVERY = 104;
const GROUND_Y = H - 58;
const ELLIS_X = 90;
const ELLIS_H = 38;

function doJump() {
  if (state.phase === 'idle') {
    state.phase = 'playing'; state.cvy = JUMP;
    spawnSparks(ELLIS_X, state.cy, '#00ff88');
  } else if (state.phase === 'playing') {
    state.cvy = JUMP;
    spawnSparks(ELLIS_X, state.cy, '#00ff88');
  } else if (state.phase === 'dead' && state.deathTimer > 70) {
    const best = state.best; resetState(); state.best = best;
  }
}

function spawnSparks(x, y, color) {
  for (let i = 0; i < 10; i++) {
    const angle = Math.random()*Math.PI*2;
    const spd = Math.random()*3+0.5;
    state.sparks.push({
      x: x+(Math.random()-0.5)*16, y: y+ELLIS_H/2,
      vx: Math.cos(angle)*spd, vy: Math.sin(angle)*spd-1.5,
      life: 1.0, r: Math.random()*3+1, color
    });
  }
}

document.addEventListener('keydown', e => {
  if (e.code==='Space'||e.code==='ArrowUp') { e.preventDefault(); doJump(); }
});
canvas.addEventListener('click', doJump);
canvas.addEventListener('touchstart', e => { e.preventDefault(); doJump(); }, {passive:false});

function update() {
  state.frame++;
  for (const s of SNOWFLAKES) {
    s.y += s.speed; s.x += s.drift;
    if (s.y > H) { s.y = -5; s.x = Math.random()*W; }
    if (s.x > W) s.x = 0; if (s.x < 0) s.x = W;
  }

  if (state.phase === 'playing') {
    state.cvy += GRAVITY;
    state.cy += state.cvy;
    state.crowdWave = Math.sin(state.frame*0.05)*3;

    if (state.frame % 2 === 0) {
      state.iceTrail.push({
        x: ELLIS_X - 8, y: state.cy + ELLIS_H/2 - 2,
        life: 1.0, w: 20+Math.random()*8
      });
    }
    for (const t of state.iceTrail) t.life -= 0.04;
    state.iceTrail = state.iceTrail.filter(t => t.life > 0);

    for (const sp of state.sparks) {
      sp.x += sp.vx; sp.y += sp.vy; sp.vy += 0.12; sp.life -= 0.05;
    }
    state.sparks = state.sparks.filter(s => s.life > 0);

    state.obstTimer++;
    if (state.obstTimer >= OBS_EVERY) {
      state.obstTimer = 0;
      const topH = 75 + Math.random()*(H - OBS_GAP - 190);
      state.obstacles.push({x: W+20, topH, scored: false});
    }
    for (const o of state.obstacles) o.x -= OBS_SPD;
    state.obstacles = state.obstacles.filter(o => o.x > -OBS_W-20);

    for (const o of state.obstacles) {
      if (!o.scored && o.x + OBS_W < ELLIS_X) {
        o.scored = true; state.score++;
        if (state.score > state.best) state.best = state.score;
        spawnSparks(ELLIS_X+30, H/2, '#ffe000');
      }
    }

    const hr = 9, vr = 14;
    if (state.cy - vr < 8 || state.cy + vr > GROUND_Y) {
      state.phase = 'dead'; state.deathTimer = 0;
      spawnSparks(ELLIS_X, state.cy, '#ff4444');
    }
    for (const o of state.obstacles) {
      const inX = ELLIS_X+hr > o.x+5 && ELLIS_X-hr < o.x+OBS_W-5;
      if (inX && (state.cy-vr < o.topH || state.cy+vr > o.topH+OBS_GAP)) {
        state.phase = 'dead'; state.deathTimer = 0;
        spawnSparks(ELLIS_X, state.cy, '#ff4444');
      }
    }
  }

  if (state.phase === 'dead') {
    state.deathTimer++;
    state.cy = Math.min(state.cy+5, GROUND_Y-12);
    for (const sp of state.sparks) {
      sp.x += sp.vx; sp.y += sp.vy; sp.vy += 0.12; sp.life -= 0.04;
    }
    state.sparks = state.sparks.filter(s => s.life > 0);
  }
}

function drawIcicleWall(x, height, fromTop) {
  const grad = ctx.createLinearGradient(x, 0, x+OBS_W, 0);
  grad.addColorStop(0, '#0a4030');
  grad.addColorStop(0.3, '#0e6040');
  grad.addColorStop(0.6, '#18a060');
  grad.addColorStop(1, '#0a3025');
  ctx.fillStyle = grad;
  ctx.shadowColor = '#00ff88';
  ctx.shadowBlur = 14;

  if (fromTop) {
    ctx.fillRect(x, 0, OBS_W, height);
    ctx.fillStyle = '#20c070';
    ctx.fillRect(x-6, height-18, OBS_W+12, 18);
    const spikes = 5, sw = (OBS_W+12)/spikes;
    for (let i = 0; i < spikes; i++) {
      const sh = 22+Math.sin(i*1.9)*10;
      ctx.fillStyle = `rgba(0,220,120,${0.7+i%2*0.2})`;
      ctx.beginPath();
      ctx.moveTo(x-6+i*sw, height);
      ctx.lineTo(x-6+i*sw+sw/2, height+sh);
      ctx.lineTo(x-6+(i+1)*sw, height);
      ctx.closePath(); ctx.fill();
    }
    ctx.shadowBlur = 0;
    ctx.strokeStyle = 'rgba(150,255,200,0.3)';
    ctx.lineWidth = 2;
    for (let i = 0; i < 3; i++) {
      ctx.beginPath();
      ctx.moveTo(x+8+i*16, 0); ctx.lineTo(x+8+i*16, height); ctx.stroke();
    }
  } else {
    const botY = GROUND_Y;
    ctx.fillRect(x, botY-height, OBS_W, height);
    ctx.fillStyle = '#20c070';
    ctx.fillRect(x-6, botY-height, OBS_W+12, 18);
    const spikes = 5, sw = (OBS_W+12)/spikes;
    for (let i = 0; i < spikes; i++) {
      const sh = 22+Math.sin(i*2.2+0.5)*10;
      ctx.fillStyle = `rgba(0,220,120,${0.7+i%2*0.2})`;
      ctx.beginPath();
      ctx.moveTo(x-6+i*sw, botY-height);
      ctx.lineTo(x-6+i*sw+sw/2, botY-height-sh);
      ctx.lineTo(x-6+(i+1)*sw, botY-height);
      ctx.closePath(); ctx.fill();
    }
    ctx.shadowBlur = 0;
    ctx.strokeStyle = 'rgba(150,255,200,0.3)';
    ctx.lineWidth = 2;
    for (let i = 0; i < 3; i++) {
      ctx.beginPath();
      ctx.moveTo(x+8+i*16, botY-height); ctx.lineTo(x+8+i*16, botY); ctx.stroke();
    }
  }
  ctx.shadowBlur = 0;
}

function drawEllis(x, y, vy, phase) {
  ctx.save();
  ctx.translate(x, y);
  const lean = phase==='dead' ? 50 : Math.max(-18, Math.min(28, vy*2.2));
  ctx.rotate(lean*Math.PI/180);

  // Shadow
  ctx.fillStyle = 'rgba(0,220,100,0.12)';
  ctx.beginPath();
  ctx.ellipse(0, ELLIS_H/2+4, 16, 5, 0, 0, Math.PI*2);
  ctx.fill();

  // Skate blades
  ctx.strokeStyle = '#aaffd0';
  ctx.lineWidth = 3; ctx.lineCap = 'round';
  ctx.shadowColor = '#00ff88'; ctx.shadowBlur = 8;
  ctx.beginPath(); ctx.moveTo(-12, ELLIS_H/2+3); ctx.lineTo(10, ELLIS_H/2+3); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-8, ELLIS_H/2+3); ctx.lineTo(14, ELLIS_H/2+3); ctx.stroke();
  ctx.shadowBlur = 0;

  // Boots - black speed skates
  ctx.fillStyle = '#0a0a0a';
  ctx.beginPath(); ctx.roundRect(-12, ELLIS_H/2-10, 15, 13, 3); ctx.fill();
  ctx.beginPath(); ctx.roundRect(1, ELLIS_H/2-10, 15, 13, 3); ctx.fill();
  ctx.fillStyle = '#00ff88';
  ctx.beginPath(); ctx.roundRect(-11, ELLIS_H/2-9, 5, 3, 1); ctx.fill();
  ctx.beginPath(); ctx.roundRect(2, ELLIS_H/2-9, 5, 3, 1); ctx.fill();

  // Pants - black with green stripe
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.roundRect(-11, ELLIS_H/2-22, 10, 14, 3); ctx.fill();
  ctx.beginPath(); ctx.roundRect(2, ELLIS_H/2-22, 10, 14, 3); ctx.fill();
  ctx.strokeStyle = '#00ff88'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(-5, ELLIS_H/2-22); ctx.lineTo(-5, ELLIS_H/2-9); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(8, ELLIS_H/2-22); ctx.lineTo(8, ELLIS_H/2-9); ctx.stroke();

  // Speed skating suit - black and green
  const suitGrad = ctx.createLinearGradient(-13, -ELLIS_H/2+14, 13, ELLIS_H/2-10);
  suitGrad.addColorStop(0, '#111');
  suitGrad.addColorStop(0.4, '#1a1a1a');
  suitGrad.addColorStop(1, '#0a0a0a');
  ctx.fillStyle = suitGrad;
  ctx.shadowColor = '#00ff88'; ctx.shadowBlur = 6;
  ctx.beginPath(); ctx.roundRect(-13, -ELLIS_H/2+14, 26, 24, 4); ctx.fill();
  ctx.shadowBlur = 0;
  // Green side panels
  ctx.fillStyle = '#00cc66';
  ctx.beginPath(); ctx.roundRect(-13, -ELLIS_H/2+14, 5, 24, [4,0,0,4]); ctx.fill();
  ctx.beginPath(); ctx.roundRect(8, -ELLIS_H/2+14, 5, 24, [0,4,4,0]); ctx.fill();
  // Number on chest
  ctx.font = 'bold 9px Nunito';
  ctx.fillStyle = '#00ff88'; ctx.textAlign = 'center';
  ctx.fillText('11', 0, -ELLIS_H/2+32);

  // Arms - speed skating aerodynamic pose
  const armSwing = Math.sin(state.frame*0.18)*10;
  ctx.strokeStyle = '#1a1a1a'; ctx.lineWidth = 5; ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(-10, -ELLIS_H/2+18);
  ctx.quadraticCurveTo(-20, -ELLIS_H/2+22+armSwing, -22, -ELLIS_H/2+12+armSwing);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(10, -ELLIS_H/2+18);
  ctx.quadraticCurveTo(20, -ELLIS_H/2+14-armSwing, 21, -ELLIS_H/2+5-armSwing);
  ctx.stroke();
  // Gloves
  ctx.fillStyle = '#00cc66';
  ctx.beginPath(); ctx.arc(-22, -ELLIS_H/2+12+armSwing, 4, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(21, -ELLIS_H/2+5-armSwing, 4, 0, Math.PI*2); ctx.fill();

  // Neck
  ctx.fillStyle = '#d4a870';
  ctx.beginPath(); ctx.roundRect(-4, -ELLIS_H/2+10, 8, 6, 2); ctx.fill();

  // Head
  ctx.fillStyle = '#d4a870';
  ctx.shadowColor = '#b08040'; ctx.shadowBlur = 4;
  ctx.beginPath(); ctx.arc(0, -ELLIS_H/2+4, 12, 0, Math.PI*2); ctx.fill();
  ctx.shadowBlur = 0;

  // Speed skating helmet - black with green
  ctx.fillStyle = '#0a0a0a';
  ctx.shadowColor = '#00ff88'; ctx.shadowBlur = 8;
  ctx.beginPath();
  ctx.arc(0, -ELLIS_H/2+2, 12, Math.PI, Math.PI*2);
  ctx.fill();
  ctx.fillRect(-12, -ELLIS_H/2+2, 24, 6);
  ctx.shadowBlur = 0;
  // Helmet green accents
  ctx.fillStyle = '#00ff88';
  ctx.beginPath();
  ctx.arc(0, -ELLIS_H/2+2, 12, Math.PI+0.3, Math.PI*1.7);
  ctx.lineTo(0, -ELLIS_H/2+2);
  ctx.closePath(); ctx.fill();
  // Aerodynamic visor
  ctx.fillStyle = 'rgba(0,255,136,0.2)';
  ctx.beginPath();
  ctx.ellipse(2, -ELLIS_H/2+6, 11, 8, 0.1, -0.5, 0.8);
  ctx.fill();

  // Eyes - determined look
  ctx.fillStyle = '#1a1000';
  ctx.beginPath(); ctx.arc(-4, -ELLIS_H/2+6, 2.2, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(4, -ELLIS_H/2+6, 2.2, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(-3, -ELLIS_H/2+5, 0.8, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(5, -ELLIS_H/2+5, 0.8, 0, Math.PI*2); ctx.fill();
  // Focused brow
  ctx.strokeStyle = '#8a5020'; ctx.lineWidth = 1.8; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(-6, -ELLIS_H/2+3); ctx.lineTo(-2, -ELLIS_H/2+4); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(6, -ELLIS_H/2+3); ctx.lineTo(2, -ELLIS_H/2+4); ctx.stroke();
  // Mouth - grin
  ctx.strokeStyle = '#a06040';
  ctx.beginPath();
  ctx.arc(0, -ELLIS_H/2+10, 3.5, 0.1, Math.PI-0.1);
  ctx.stroke();

  ctx.restore();
}

function draw() {
  const f = state.frame;

  // Background - dark green-tinted arena
  const bgGrad = ctx.createLinearGradient(0, 0, 0, H);
  bgGrad.addColorStop(0, '#020d06');
  bgGrad.addColorStop(0.4, '#041408');
  bgGrad.addColorStop(0.65, '#061a0c');
  bgGrad.addColorStop(1, '#030e06');
  ctx.fillStyle = bgGrad; ctx.fillRect(0, 0, W, H);

  // Arena ceiling — green-tinted flood lights
  for (let i = 0; i < 5; i++) {
    const lx = 40+i*88;
    const flicker = 0.8+Math.sin(f*0.25+i*1.7)*0.04;
    const lg = ctx.createRadialGradient(lx, 0, 0, lx, 0, 130);
    lg.addColorStop(0, `rgba(100,255,160,${0.16*flicker})`);
    lg.addColorStop(0.5, `rgba(40,180,80,${0.06*flicker})`);
    lg.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = lg; ctx.fillRect(lx-130, 0, 260, 230);
    ctx.fillStyle = `rgba(180,255,210,${0.5*flicker})`;
    ctx.beginPath(); ctx.arc(lx, 4, 4, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = `rgba(100,220,140,0.25)`; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(lx, 0); ctx.lineTo(lx, 8); ctx.stroke();
  }

  // Stands
  ctx.fillStyle = '#060f08';
  ctx.fillRect(0, H*0.35, W, H*0.17);
  // Crowd
  for (const c of CROWD) {
    const wave = Math.sin(f*0.04+c.x*0.1)*state.crowdWave;
    const hue = 100+(c.x*2.5)%80;
    ctx.fillStyle = `hsla(${hue},55%,35%,0.65)`;
    ctx.beginPath();
    ctx.arc(c.x, c.y+wave-c.h, c.w/2, Math.PI, 0);
    ctx.rect(c.x-c.w/2, c.y+wave-c.h, c.w, c.h);
    ctx.fill();
  }
  ctx.strokeStyle = 'rgba(0,200,80,0.2)'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(0, H*0.52); ctx.lineTo(W, H*0.52); ctx.stroke();

  // Rink boards
  const boardGrad = ctx.createLinearGradient(0, H*0.52, 0, GROUND_Y);
  boardGrad.addColorStop(0, '#0a1e0c'); boardGrad.addColorStop(1, '#060e06');
  ctx.fillStyle = boardGrad; ctx.fillRect(0, H*0.52, W, GROUND_Y-H*0.52);

  // Scrolling banners — green themed
  const banners = ['SPEEDO', 'ICE FURY', 'ELLIS #11', 'FROSTRUN', 'PRO SKATE'];
  const bColors = ['#006622','#004400','#008833','#005522','#003311'];
  ctx.font = 'bold 11px Nunito'; ctx.textAlign = 'center';
  for (let i = 0; i < banners.length; i++) {
    const bx = i*90 - ((f*OBS_SPD*0.3) % (W+90));
    const by = H*0.535, bw = 80, bh = 20;
    ctx.fillStyle = bColors[i%bColors.length]; ctx.shadowBlur = 0;
    ctx.fillRect(bx-bw/2, by, bw, bh);
    ctx.fillStyle = '#00ff88'; ctx.fillText(banners[i], bx, by+14);
    ctx.fillStyle = bColors[i%bColors.length];
    ctx.fillRect(bx-bw/2+W+90, by, bw, bh);
    ctx.fillStyle = '#00ff88'; ctx.fillText(banners[i], bx+W+90, by+14);
  }

  // Ice surface - green-tinted
  const iceGrad = ctx.createLinearGradient(0, GROUND_Y-30, 0, H);
  iceGrad.addColorStop(0, '#0e3820');
  iceGrad.addColorStop(0.3, '#0c3018');
  iceGrad.addColorStop(1, '#061408');
  ctx.fillStyle = iceGrad; ctx.fillRect(0, GROUND_Y, W, H-GROUND_Y);
  ctx.fillStyle = 'rgba(0,255,136,0.08)'; ctx.fillRect(0, GROUND_Y, W, 4);

  // Center ice ring
  const logoX = W/2-((f*OBS_SPD*0.5)%(W*2))+W*0.5;
  ctx.strokeStyle = 'rgba(0,180,80,0.14)'; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.arc(logoX, GROUND_Y+20, 40, 0, Math.PI*2); ctx.stroke();
  ctx.strokeStyle = 'rgba(0,180,80,0.07)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(logoX-44, GROUND_Y+20); ctx.lineTo(logoX+44, GROUND_Y+20); ctx.stroke();

  // Scrolling ice grain lines
  ctx.strokeStyle = 'rgba(0,200,80,0.06)'; ctx.lineWidth = 1;
  const scroll = (f*OBS_SPD*0.5)%70;
  for (let x = -scroll; x < W+10; x += 70) {
    ctx.beginPath(); ctx.moveTo(x, GROUND_Y+5); ctx.lineTo(x+35, GROUND_Y+28); ctx.stroke();
  }

  // Snowflakes
  for (const s of SNOWFLAKES) {
    ctx.globalAlpha = s.alpha*0.55;
    ctx.fillStyle = '#ccffee';
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Ice trail
  for (const t of state.iceTrail) {
    ctx.globalAlpha = t.life*0.5;
    ctx.strokeStyle = '#00ff88';
    ctx.lineWidth = 2.5; ctx.lineCap = 'round';
    ctx.shadowColor = '#00cc66'; ctx.shadowBlur = 5;
    ctx.beginPath();
    ctx.moveTo(t.x, t.y); ctx.lineTo(t.x-t.w, t.y+3); ctx.stroke();
    ctx.shadowBlur = 0;
  }
  ctx.globalAlpha = 1;

  // Obstacles
  for (const o of state.obstacles) {
    const botH = GROUND_Y-o.topH-OBS_GAP;
    drawIcicleWall(o.x, o.topH, true);
    drawIcicleWall(o.x, botH, false);
  }

  // Sparks
  for (const sp of state.sparks) {
    ctx.globalAlpha = sp.life;
    ctx.fillStyle = sp.color;
    ctx.shadowColor = sp.color; ctx.shadowBlur = 10;
    ctx.beginPath(); ctx.arc(sp.x, sp.y, sp.r, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;
  }
  ctx.globalAlpha = 1;

  // Ellis
  drawEllis(ELLIS_X, state.cy, state.cvy, state.phase);

  // Score
  ctx.font = "bold 42px 'Righteous', cursive";
  ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.fillText(state.score, W/2+2, 55);
  ctx.fillStyle = '#ffffff';
  ctx.shadowColor = '#00ff88'; ctx.shadowBlur = 18;
  ctx.fillText(state.score, W/2, 53);
  ctx.shadowBlur = 0;

  // === IDLE SCREEN ===
  if (state.phase === 'idle') {
    ctx.fillStyle = 'rgba(2,10,4,0.68)';
    ctx.fillRect(0, 0, W, H);
    ctx.textAlign = 'center';

    const glow = ctx.createRadialGradient(W/2, 230, 0, W/2, 230, 170);
    glow.addColorStop(0, 'rgba(0,200,80,0.12)');
    glow.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = glow; ctx.fillRect(W/2-170, 120, 340, 220);

    ctx.font = "bold 76px 'Righteous', cursive";
    ctx.fillStyle = '#ffffff';
    ctx.shadowColor = '#00ff88'; ctx.shadowBlur = 35;
    ctx.fillText('ELLIS', W/2, 218);

    ctx.font = "bold 38px 'Righteous', cursive";
    ctx.fillStyle = '#00ff88';
    ctx.shadowColor = '#00aa44'; ctx.shadowBlur = 20;
    ctx.fillText('SKATES', W/2, 264);
    ctx.shadowBlur = 0;

    ctx.font = "900 12px 'Nunito', sans-serif";
    ctx.fillStyle = 'rgba(0,255,136,0.5)';
    ctx.fillText('SPEED SKATING CHAMPION', W/2, 292);

    const pulse = Math.sin(f*0.08)*0.25+0.75;
    ctx.globalAlpha = pulse;
    ctx.fillStyle = '#fff';
    ctx.font = "700 16px 'Nunito', sans-serif";
    ctx.fillText('★ TAP OR PRESS SPACE TO SKATE ★', W/2, 346);
    ctx.globalAlpha = 1;

    if (state.best > 0) {
      ctx.fillStyle = '#ffe000';
      ctx.shadowColor = '#ffaa00'; ctx.shadowBlur = 10;
      ctx.font = "700 17px 'Nunito', sans-serif";
      ctx.fillText('🏆 BEST: '+state.best, W/2, 384);
      ctx.shadowBlur = 0;
    }
    ctx.fillStyle = 'rgba(0,200,80,0.28)';
    ctx.font = "700 12px 'Nunito', sans-serif";
    ctx.fillText('#11 — ELLIS THE SPEEDSTER', W/2, 416);
  }

  // === DEAD SCREEN ===
  if (state.phase === 'dead' && state.deathTimer > 35) {
    ctx.fillStyle = 'rgba(2,10,4,0.78)';
    ctx.beginPath(); ctx.roundRect(45, 185, 330, 240, 14); ctx.fill();
    ctx.strokeStyle = 'rgba(0,220,100,0.4)'; ctx.lineWidth = 2;
    ctx.shadowColor = '#00ff88'; ctx.shadowBlur = 14;
    ctx.stroke(); ctx.shadowBlur = 0;

    ctx.textAlign = 'center';
    ctx.font = "bold 32px 'Righteous', cursive";
    ctx.fillStyle = '#ff4444';
    ctx.shadowColor = '#ff0000'; ctx.shadowBlur = 16;
    ctx.fillText('ELLIS CRASHED!', W/2, 232);
    ctx.shadowBlur = 0;

    ctx.font = "bold 24px 'Nunito', sans-serif";
    ctx.fillStyle = '#e8ffee';
    ctx.fillText('Score: '+state.score, W/2, 275);
    ctx.fillStyle = '#ffe000';
    ctx.shadowColor = '#ffaa00'; ctx.shadowBlur = 8;
    ctx.fillText('🏆 Best: '+state.best, W/2, 310);
    ctx.shadowBlur = 0;

    if (state.deathTimer > 70) {
      const p2 = Math.sin(f*0.1)*0.25+0.75;
      ctx.globalAlpha = p2;
      ctx.fillStyle = '#00ff88';
      ctx.font = "700 15px 'Nunito', sans-serif";
      ctx.fillText('★ TAP / SPACE TO TRY AGAIN ★', W/2, 383);
      ctx.globalAlpha = 1;
    }
  }
}

function loop() { update(); draw(); requestAnimationFrame(loop); }
loop();
</script>
</body>
</html>
