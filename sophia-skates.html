<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sophia Skates</title>
<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@700&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: radial-gradient(ellipse at top, #0d0015 0%, #08000f 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Nunito', sans-serif;
    overflow: hidden;
  }
  .title-label {
    font-family: 'Comfortaa', cursive;
    color: #ff88dd;
    font-size: 16px;
    letter-spacing: 5px;
    margin-bottom: 12px;
    text-shadow: 0 0 20px rgba(255,100,200,0.9), 0 0 40px rgba(180,50,150,0.5);
  }
  canvas {
    display: block;
    cursor: pointer;
    border-radius: 12px;
    box-shadow:
      0 0 0 2px rgba(255,100,200,0.35),
      0 0 40px rgba(220,80,180,0.45),
      0 0 80px rgba(150,40,120,0.25);
  }
  .hint {
    color: rgba(255,120,210,0.35);
    font-size: 12px;
    letter-spacing: 3px;
    margin-top: 12px;
    font-weight: 900;
    text-transform: uppercase;
  }
</style>
</head>
<body>
<div class="title-label">✦ SOPHIA SKATES ✦</div>
<canvas id="c" width="420" height="620"></canvas>
<div class="hint">Space / Click to Jump</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 420, H = 620;

// Snowflakes
const SNOWFLAKES = Array.from({length: 65}, () => ({
  x: Math.random()*W, y: Math.random()*H,
  r: Math.random()*2.2+0.4,
  speed: Math.random()*0.6+0.15,
  drift: (Math.random()-0.5)*0.35,
  alpha: Math.random()*0.5+0.15
}));

// Glitter particles (always floating)
const GLITTER = Array.from({length: 30}, () => ({
  x: Math.random()*W, y: Math.random()*H,
  r: Math.random()*1.5+0.5,
  speed: Math.random()*0.3+0.1,
  drift: (Math.random()-0.5)*0.2,
  alpha: Math.random(),
  hue: Math.random()*60+300
}));

// Crowd
const CROWD = Array.from({length: 45}, (_, i) => ({
  x: (i*10)%W,
  y: H*0.50+Math.sin(i*2.1)*7,
  h: 11+Math.random()*10,
  w: 7+Math.random()*5
}));

let state = {};
function resetState() {
  state = {
    phase: 'idle',
    cy: H-140, cvy: 0,
    frame: 0,
    obstacles: [], obstTimer: 0,
    score: 0, best: 0,
    deathTimer: 0,
    sparks: [], iceTrail: [],
    crowdWave: 0,
    ribbons: []
  };
}
resetState();

const GRAVITY = 0.39;
const JUMP = -9.0;
const OBS_W = 54;
const OBS_GAP = 162;
const OBS_SPD = 2.7;
const OBS_EVERY = 105;
const GROUND_Y = H - 58;
const SOPHIA_X = 90;
const SOPHIA_H = 40;

function doJump() {
  if (state.phase === 'idle') {
    state.phase = 'playing'; state.cvy = JUMP;
    spawnSparks(SOPHIA_X, state.cy, '#ff88dd');
    spawnRibbons();
  } else if (state.phase === 'playing') {
    state.cvy = JUMP;
    spawnSparks(SOPHIA_X, state.cy, '#ff88dd');
    spawnRibbons();
  } else if (state.phase === 'dead' && state.deathTimer > 70) {
    const best = state.best; resetState(); state.best = best;
  }
}

function spawnSparks(x, y, color) {
  for (let i = 0; i < 12; i++) {
    const angle = Math.random()*Math.PI*2;
    const spd = Math.random()*3.5+0.5;
    const hue = 300+Math.random()*60;
    state.sparks.push({
      x: x+(Math.random()-0.5)*18, y: y+SOPHIA_H/2,
      vx: Math.cos(angle)*spd, vy: Math.sin(angle)*spd-2,
      life: 1.0, r: Math.random()*3+1,
      color: `hsl(${hue},100%,75%)`
    });
  }
}

function spawnRibbons() {
  for (let i = 0; i < 5; i++) {
    state.ribbons.push({
      x: SOPHIA_X+(Math.random()-0.5)*30,
      y: state.cy,
      vx: (Math.random()-0.5)*2,
      vy: -Math.random()*3-1,
      life: 1.0,
      len: Math.random()*16+8,
      hue: 300+Math.random()*80,
      angle: Math.random()*Math.PI*2,
      spin: (Math.random()-0.5)*0.3
    });
  }
}

document.addEventListener('keydown', e => {
  if (e.code==='Space'||e.code==='ArrowUp') { e.preventDefault(); doJump(); }
});
canvas.addEventListener('click', doJump);
canvas.addEventListener('touchstart', e => { e.preventDefault(); doJump(); }, {passive:false});

function update() {
  state.frame++;

  for (const s of SNOWFLAKES) {
    s.y += s.speed; s.x += s.drift;
    if (s.y > H) { s.y = -5; s.x = Math.random()*W; }
    if (s.x > W) s.x = 0; if (s.x < 0) s.x = W;
  }
  for (const g of GLITTER) {
    g.y -= g.speed; g.x += g.drift;
    if (g.y < -5) { g.y = H+5; g.x = Math.random()*W; }
    g.alpha = Math.sin(state.frame*0.05+g.x)*0.4+0.4;
  }

  if (state.phase === 'playing') {
    state.cvy += GRAVITY;
    state.cy += state.cvy;
    state.crowdWave = Math.sin(state.frame*0.05)*4;

    if (state.frame % 2 === 0) {
      state.iceTrail.push({
        x: SOPHIA_X-8, y: state.cy+SOPHIA_H/2-2,
        life: 1.0, w: 22+Math.random()*8
      });
    }
    for (const t of state.iceTrail) t.life -= 0.04;
    state.iceTrail = state.iceTrail.filter(t => t.life > 0);

    for (const sp of state.sparks) {
      sp.x += sp.vx; sp.y += sp.vy; sp.vy += 0.1; sp.life -= 0.05;
    }
    state.sparks = state.sparks.filter(s => s.life > 0);

    for (const r of state.ribbons) {
      r.x += r.vx; r.y += r.vy; r.vy += 0.08;
      r.angle += r.spin; r.life -= 0.03;
    }
    state.ribbons = state.ribbons.filter(r => r.life > 0);

    state.obstTimer++;
    if (state.obstTimer >= OBS_EVERY) {
      state.obstTimer = 0;
      const topH = 75+Math.random()*(H-OBS_GAP-190);
      state.obstacles.push({x: W+20, topH, scored: false});
    }
    for (const o of state.obstacles) o.x -= OBS_SPD;
    state.obstacles = state.obstacles.filter(o => o.x > -OBS_W-20);

    for (const o of state.obstacles) {
      if (!o.scored && o.x+OBS_W < SOPHIA_X) {
        o.scored = true; state.score++;
        if (state.score > state.best) state.best = state.score;
        spawnSparks(SOPHIA_X+30, H/2, '#ffaaff');
        spawnRibbons();
      }
    }

    const hr = 9, vr = 14;
    if (state.cy-vr < 8 || state.cy+vr > GROUND_Y) {
      state.phase = 'dead'; state.deathTimer = 0;
      spawnSparks(SOPHIA_X, state.cy, '#ff4488');
    }
    for (const o of state.obstacles) {
      const inX = SOPHIA_X+hr > o.x+5 && SOPHIA_X-hr < o.x+OBS_W-5;
      if (inX && (state.cy-vr < o.topH || state.cy+vr > o.topH+OBS_GAP)) {
        state.phase = 'dead'; state.deathTimer = 0;
        spawnSparks(SOPHIA_X, state.cy, '#ff4488');
      }
    }
  }

  if (state.phase === 'dead') {
    state.deathTimer++;
    state.cy = Math.min(state.cy+5, GROUND_Y-12);
    for (const sp of state.sparks) {
      sp.x += sp.vx; sp.y += sp.vy; sp.vy += 0.1; sp.life -= 0.04;
    }
    state.sparks = state.sparks.filter(s => s.life > 0);
    for (const r of state.ribbons) {
      r.x += r.vx; r.y += r.vy; r.vy += 0.08; r.angle += r.spin; r.life -= 0.03;
    }
    state.ribbons = state.ribbons.filter(r => r.life > 0);
  }
}

function drawObstacle(x, height, fromTop) {
  // Crystal/diamond ice pillars
  const grad = ctx.createLinearGradient(x, 0, x+OBS_W, 0);
  grad.addColorStop(0, '#5a0060');
  grad.addColorStop(0.3, '#aa20bb');
  grad.addColorStop(0.6, '#dd50ee');
  grad.addColorStop(1, '#4a0055');
  ctx.fillStyle = grad;
  ctx.shadowColor = '#ff44ff'; ctx.shadowBlur = 16;

  if (fromTop) {
    ctx.fillRect(x, 0, OBS_W, height);
    ctx.fillStyle = '#ee66ff';
    ctx.fillRect(x-6, height-18, OBS_W+12, 18);
    const spikes = 5, sw = (OBS_W+12)/spikes;
    for (let i = 0; i < spikes; i++) {
      const sh = 22+Math.sin(i*1.9)*10;
      ctx.fillStyle = `rgba(220,80,255,${0.75+i%2*0.15})`;
      ctx.beginPath();
      ctx.moveTo(x-6+i*sw, height);
      ctx.lineTo(x-6+i*sw+sw/2, height+sh);
      ctx.lineTo(x-6+(i+1)*sw, height);
      ctx.closePath(); ctx.fill();
      // Sparkle on tip
      ctx.fillStyle = 'rgba(255,220,255,0.8)';
      ctx.beginPath();
      ctx.arc(x-6+i*sw+sw/2, height+sh-2, 1.5, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.shadowBlur = 0;
    ctx.strokeStyle = 'rgba(255,180,255,0.3)'; ctx.lineWidth = 1.5;
    for (let i = 0; i < 3; i++) {
      ctx.beginPath();
      ctx.moveTo(x+8+i*16, 0); ctx.lineTo(x+8+i*16, height); ctx.stroke();
    }
  } else {
    const botY = GROUND_Y;
    ctx.fillRect(x, botY-height, OBS_W, height);
    ctx.fillStyle = '#ee66ff';
    ctx.fillRect(x-6, botY-height, OBS_W+12, 18);
    const spikes = 5, sw = (OBS_W+12)/spikes;
    for (let i = 0; i < spikes; i++) {
      const sh = 22+Math.sin(i*2.2+0.5)*10;
      ctx.fillStyle = `rgba(220,80,255,${0.75+i%2*0.15})`;
      ctx.beginPath();
      ctx.moveTo(x-6+i*sw, botY-height);
      ctx.lineTo(x-6+i*sw+sw/2, botY-height-sh);
      ctx.lineTo(x-6+(i+1)*sw, botY-height);
      ctx.closePath(); ctx.fill();
      ctx.fillStyle = 'rgba(255,220,255,0.8)';
      ctx.beginPath();
      ctx.arc(x-6+i*sw+sw/2, botY-height-sh+2, 1.5, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.shadowBlur = 0;
    ctx.strokeStyle = 'rgba(255,180,255,0.3)'; ctx.lineWidth = 1.5;
    for (let i = 0; i < 3; i++) {
      ctx.beginPath();
      ctx.moveTo(x+8+i*16, botY-height); ctx.lineTo(x+8+i*16, botY); ctx.stroke();
    }
  }
  ctx.shadowBlur = 0;
}

function drawSophia(x, y, vy, phase) {
  ctx.save();
  ctx.translate(x, y);
  const lean = phase==='dead' ? 45 : Math.max(-20, Math.min(25, vy*2.3));
  ctx.rotate(lean*Math.PI/180);

  // Shadow
  ctx.fillStyle = 'rgba(255,100,220,0.12)';
  ctx.beginPath(); ctx.ellipse(0, SOPHIA_H/2+4, 16, 5, 0, 0, Math.PI*2); ctx.fill();

  // Skate blades — silver
  ctx.strokeStyle = '#ffd0ff'; ctx.lineWidth = 3; ctx.lineCap = 'round';
  ctx.shadowColor = '#ff88dd'; ctx.shadowBlur = 8;
  ctx.beginPath(); ctx.moveTo(-12, SOPHIA_H/2+3); ctx.lineTo(10, SOPHIA_H/2+3); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-8, SOPHIA_H/2+3); ctx.lineTo(14, SOPHIA_H/2+3); ctx.stroke();
  ctx.shadowBlur = 0;

  // White figure skate boots with pink bow
  ctx.fillStyle = '#fff8ff';
  ctx.beginPath(); ctx.roundRect(-12, SOPHIA_H/2-10, 15, 13, 3); ctx.fill();
  ctx.beginPath(); ctx.roundRect(1, SOPHIA_H/2-10, 15, 13, 3); ctx.fill();
  // Lace details
  ctx.strokeStyle = '#ffaadd'; ctx.lineWidth = 1;
  for (let i = 0; i < 3; i++) {
    ctx.beginPath(); ctx.moveTo(-10, SOPHIA_H/2-8+i*3); ctx.lineTo(-3, SOPHIA_H/2-8+i*3); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(3, SOPHIA_H/2-8+i*3); ctx.lineTo(10, SOPHIA_H/2-8+i*3); ctx.stroke();
  }
  // Tiny bows on boots
  ctx.fillStyle = '#ff66bb';
  ctx.beginPath(); ctx.arc(-10, SOPHIA_H/2-10, 2.5, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(3, SOPHIA_H/2-10, 2.5, 0, Math.PI*2); ctx.fill();

  // Tights — light pink
  ctx.fillStyle = '#ffd0e8';
  ctx.beginPath(); ctx.roundRect(-10, SOPHIA_H/2-22, 9, 13, 2); ctx.fill();
  ctx.beginPath(); ctx.roundRect(3, SOPHIA_H/2-22, 9, 13, 2); ctx.fill();

  // Skating dress — layered purple/pink tutu
  // Underskirt flare
  ctx.fillStyle = '#cc44aa';
  ctx.shadowColor = '#ff44cc'; ctx.shadowBlur = 8;
  ctx.beginPath();
  ctx.moveTo(-16, SOPHIA_H/2-16);
  ctx.bezierCurveTo(-20, SOPHIA_H/2-8, -18, SOPHIA_H/2, -14, SOPHIA_H/2-4);
  ctx.lineTo(14, SOPHIA_H/2-4);
  ctx.bezierCurveTo(18, SOPHIA_H/2, 20, SOPHIA_H/2-8, 16, SOPHIA_H/2-16);
  ctx.closePath(); ctx.fill();
  // Top layer
  ctx.fillStyle = '#ee55cc';
  ctx.beginPath();
  ctx.moveTo(-14, SOPHIA_H/2-18);
  ctx.bezierCurveTo(-17, SOPHIA_H/2-10, -14, SOPHIA_H/2-6, -10, SOPHIA_H/2-8);
  ctx.lineTo(10, SOPHIA_H/2-8);
  ctx.bezierCurveTo(14, SOPHIA_H/2-6, 17, SOPHIA_H/2-10, 14, SOPHIA_H/2-18);
  ctx.closePath(); ctx.fill();
  ctx.shadowBlur = 0;
  // Tutu sparkles
  ctx.fillStyle = 'rgba(255,255,255,0.55)';
  for (let i = -13; i < 14; i += 4) {
    ctx.beginPath(); ctx.arc(i, SOPHIA_H/2-9, 1.2, 0, Math.PI*2); ctx.fill();
  }

  // Bodice
  const bodiceGrad = ctx.createLinearGradient(-10, -SOPHIA_H/2+14, 10, SOPHIA_H/2-16);
  bodiceGrad.addColorStop(0, '#dd44bb');
  bodiceGrad.addColorStop(0.5, '#ff66dd');
  bodiceGrad.addColorStop(1, '#bb3399');
  ctx.fillStyle = bodiceGrad;
  ctx.shadowColor = '#ff44cc'; ctx.shadowBlur = 6;
  ctx.beginPath(); ctx.roundRect(-10, -SOPHIA_H/2+14, 20, 22, 4); ctx.fill();
  ctx.shadowBlur = 0;
  // Sequin details
  ctx.fillStyle = 'rgba(255,220,255,0.6)';
  for (let i = 0; i < 6; i++) {
    const sx = -6+Math.sin(i*1.1)*5, sy = -SOPHIA_H/2+18+i*3;
    ctx.beginPath(); ctx.arc(sx, sy, 1, 0, Math.PI*2); ctx.fill();
  }

  // Arms — graceful figure skating pose
  const armWave = Math.sin(state.frame*0.15)*10;
  ctx.strokeStyle = '#ff66dd'; ctx.lineWidth = 4; ctx.lineCap = 'round';
  // Back arm sweeping behind
  ctx.beginPath();
  ctx.moveTo(-9, -SOPHIA_H/2+18);
  ctx.quadraticCurveTo(-22, -SOPHIA_H/2+14+armWave, -26, -SOPHIA_H/2+6+armWave);
  ctx.stroke();
  // Front arm extended gracefully up
  ctx.beginPath();
  ctx.moveTo(9, -SOPHIA_H/2+18);
  ctx.quadraticCurveTo(20, -SOPHIA_H/2+8-armWave, 22, -SOPHIA_H/2-2-armWave);
  ctx.stroke();
  // Mittens
  ctx.fillStyle = '#ff99ee';
  ctx.beginPath(); ctx.arc(-26, -SOPHIA_H/2+6+armWave, 4, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(22, -SOPHIA_H/2-2-armWave, 4, 0, Math.PI*2); ctx.fill();

  // Neck
  ctx.fillStyle = '#f5d0c0';
  ctx.beginPath(); ctx.roundRect(-4, -SOPHIA_H/2+10, 8, 6, 2); ctx.fill();

  // Head
  ctx.fillStyle = '#f5d0c0';
  ctx.shadowColor = '#e0a880'; ctx.shadowBlur = 5;
  ctx.beginPath(); ctx.arc(0, -SOPHIA_H/2+4, 12, 0, Math.PI*2); ctx.fill();
  ctx.shadowBlur = 0;

  // Hair — long dark brown with bun + tiara
  ctx.fillStyle = '#3a1a05';
  // Bun top
  ctx.beginPath(); ctx.arc(0, -SOPHIA_H/2-4, 9, Math.PI, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(0, -SOPHIA_H/2+2, 12, Math.PI, Math.PI*2); ctx.fill();
  ctx.fillRect(-12, -SOPHIA_H/2+2, 24, 3);
  // Side hair strands
  ctx.beginPath(); ctx.arc(-11, -SOPHIA_H/2+5, 4, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(11, -SOPHIA_H/2+5, 4, 0, Math.PI*2); ctx.fill();
  // Bun detail
  ctx.fillStyle = '#5a2a0a';
  ctx.beginPath(); ctx.arc(0, -SOPHIA_H/2-3, 6, 0, Math.PI*2); ctx.fill();

  // Tiara ✨
  ctx.strokeStyle = '#ffd700'; ctx.lineWidth = 2;
  ctx.shadowColor = '#ffd700'; ctx.shadowBlur = 8;
  ctx.beginPath();
  ctx.moveTo(-10, -SOPHIA_H/2+1);
  ctx.lineTo(-7, -SOPHIA_H/2-5);
  ctx.lineTo(-4, -SOPHIA_H/2+1);
  ctx.lineTo(0, -SOPHIA_H/2-8);
  ctx.lineTo(4, -SOPHIA_H/2+1);
  ctx.lineTo(7, -SOPHIA_H/2-5);
  ctx.lineTo(10, -SOPHIA_H/2+1);
  ctx.stroke();
  // Tiara gems
  ctx.fillStyle = '#ff44ff';
  ctx.beginPath(); ctx.arc(0, -SOPHIA_H/2-8, 2, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#ffaaff';
  ctx.beginPath(); ctx.arc(-7, -SOPHIA_H/2-5, 1.5, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(7, -SOPHIA_H/2-5, 1.5, 0, Math.PI*2); ctx.fill();
  ctx.shadowBlur = 0;

  // Eyes — big, expressive
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.ellipse(-4, -SOPHIA_H/2+7, 3, 3.5, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(4, -SOPHIA_H/2+7, 3, 3.5, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#6633aa';
  ctx.beginPath(); ctx.arc(-4, -SOPHIA_H/2+7, 2, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(4, -SOPHIA_H/2+7, 2, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.arc(-4, -SOPHIA_H/2+7, 1.2, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(4, -SOPHIA_H/2+7, 1.2, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(-3, -SOPHIA_H/2+6, 0.8, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(5, -SOPHIA_H/2+6, 0.8, 0, Math.PI*2); ctx.fill();
  // Eyelashes
  ctx.strokeStyle = '#111'; ctx.lineWidth = 1;
  for (let i = -2; i <= 2; i++) {
    ctx.beginPath();
    ctx.moveTo(-4+i*1.2, -SOPHIA_H/2+4);
    ctx.lineTo(-4+i*1.3, -SOPHIA_H/2+2.5);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(4+i*1.2, -SOPHIA_H/2+4);
    ctx.lineTo(4+i*1.3, -SOPHIA_H/2+2.5);
    ctx.stroke();
  }

  // Smile
  ctx.strokeStyle = '#dd6680'; ctx.lineWidth = 1.8; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.arc(0, -SOPHIA_H/2+10, 3.5, 0.15, Math.PI-0.15); ctx.stroke();
  // Rosy cheeks
  ctx.fillStyle = 'rgba(255,120,160,0.28)';
  ctx.beginPath(); ctx.ellipse(-6, -SOPHIA_H/2+10, 3.5, 2.5, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(6, -SOPHIA_H/2+10, 3.5, 2.5, 0, 0, Math.PI*2); ctx.fill();

  ctx.restore();
}

function draw() {
  const f = state.frame;

  // Background — deep purple night rink
  const bgGrad = ctx.createLinearGradient(0, 0, 0, H);
  bgGrad.addColorStop(0, '#0d0018');
  bgGrad.addColorStop(0.4, '#120022');
  bgGrad.addColorStop(0.65, '#160028');
  bgGrad.addColorStop(1, '#0a0015');
  ctx.fillStyle = bgGrad; ctx.fillRect(0, 0, W, H);

  // Stars
  for (let i = 0; i < 35; i++) {
    const sx = ((i*139+f*0.015)%W);
    const sy = (i*71)%(H*0.4);
    const sr = i%4===0 ? 1.8 : 0.8;
    const alpha = 0.3+Math.sin(f*0.04+i)*0.3;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = i%3===0 ? '#ffd0ff' : '#fff';
    ctx.beginPath(); ctx.arc(sx, sy, sr, 0, Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Pink/purple aurora
  for (let i = 0; i < 4; i++) {
    const aGrad = ctx.createLinearGradient(0, 20+i*25, W, 80+i*25);
    const hue = 290+i*18+Math.sin(f*0.015)*20;
    aGrad.addColorStop(0, `hsla(${hue},90%,60%,0)`);
    aGrad.addColorStop(0.3, `hsla(${hue},90%,65%,0.05)`);
    aGrad.addColorStop(0.7, `hsla(${hue+25},90%,70%,0.07)`);
    aGrad.addColorStop(1, `hsla(${hue+25},90%,70%,0)`);
    ctx.fillStyle = aGrad; ctx.fillRect(0, 10+i*20, W, 70);
  }

  // Arena spotlights — pink tinted
  for (let i = 0; i < 5; i++) {
    const lx = 40+i*88;
    const flicker = 0.8+Math.sin(f*0.2+i*1.5)*0.04;
    const lg = ctx.createRadialGradient(lx, 0, 0, lx, 0, 130);
    lg.addColorStop(0, `rgba(255,150,220,${0.15*flicker})`);
    lg.addColorStop(0.5, `rgba(200,80,180,${0.05*flicker})`);
    lg.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = lg; ctx.fillRect(lx-130, 0, 260, 230);
    ctx.fillStyle = `rgba(255,200,240,${0.55*flicker})`;
    ctx.beginPath(); ctx.arc(lx, 4, 3.5, 0, Math.PI*2); ctx.fill();
  }

  // Glitter particles
  for (const g of GLITTER) {
    ctx.globalAlpha = g.alpha*0.6;
    ctx.fillStyle = `hsl(${g.hue},100%,75%)`;
    ctx.shadowColor = `hsl(${g.hue},100%,75%)`; ctx.shadowBlur = 4;
    ctx.beginPath(); ctx.arc(g.x, g.y, g.r, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;
  }
  ctx.globalAlpha = 1;

  // Stands
  ctx.fillStyle = '#0e0018';
  ctx.fillRect(0, H*0.35, W, H*0.17);
  for (const c of CROWD) {
    const wave = Math.sin(f*0.04+c.x*0.1)*state.crowdWave;
    const hue = 280+(c.x*2)%80;
    ctx.fillStyle = `hsla(${hue},50%,35%,0.6)`;
    ctx.beginPath();
    ctx.arc(c.x, c.y+wave-c.h, c.w/2, Math.PI, 0);
    ctx.rect(c.x-c.w/2, c.y+wave-c.h, c.w, c.h);
    ctx.fill();
  }
  ctx.strokeStyle = 'rgba(220,80,180,0.2)'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(0, H*0.52); ctx.lineTo(W, H*0.52); ctx.stroke();

  // Rink boards
  const boardGrad = ctx.createLinearGradient(0, H*0.52, 0, GROUND_Y);
  boardGrad.addColorStop(0, '#1a0028'); boardGrad.addColorStop(1, '#0d0018');
  ctx.fillStyle = boardGrad; ctx.fillRect(0, H*0.52, W, GROUND_Y-H*0.52);

  // Scrolling banners — pink/purple
  const banners = ['SOPHIA ✦', 'ICE QUEEN', 'GLAM RINK', 'SPARKLE', 'PRIMA'];
  const bColors = ['#880055','#660044','#991166','#770055','#550033'];
  ctx.font = 'bold 11px Nunito'; ctx.textAlign = 'center';
  for (let i = 0; i < banners.length; i++) {
    const bx = i*90-((f*OBS_SPD*0.3)%(W+90));
    const by = H*0.535, bw = 80, bh = 20;
    ctx.fillStyle = bColors[i%bColors.length]; ctx.shadowBlur = 0;
    ctx.fillRect(bx-bw/2, by, bw, bh);
    ctx.fillStyle = '#ffaaee'; ctx.fillText(banners[i], bx, by+14);
    ctx.fillStyle = bColors[i%bColors.length];
    ctx.fillRect(bx-bw/2+W+90, by, bw, bh);
    ctx.fillStyle = '#ffaaee'; ctx.fillText(banners[i], bx+W+90, by+14);
  }

  // Ice surface — pink-purple tinted
  const iceGrad = ctx.createLinearGradient(0, GROUND_Y-30, 0, H);
  iceGrad.addColorStop(0, '#2a0840');
  iceGrad.addColorStop(0.3, '#220636');
  iceGrad.addColorStop(1, '#110218');
  ctx.fillStyle = iceGrad; ctx.fillRect(0, GROUND_Y, W, H-GROUND_Y);
  ctx.fillStyle = 'rgba(255,100,220,0.12)'; ctx.fillRect(0, GROUND_Y, W, 4);

  // Center ice heart/flower
  const logoX = W/2-((f*OBS_SPD*0.5)%(W*2))+W*0.5;
  ctx.strokeStyle = 'rgba(220,60,180,0.15)'; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.arc(logoX, GROUND_Y+20, 40, 0, Math.PI*2); ctx.stroke();
  // Small heart in center
  ctx.strokeStyle = 'rgba(255,100,200,0.2)'; ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(logoX, GROUND_Y+24);
  ctx.bezierCurveTo(logoX-8, GROUND_Y+16, logoX-14, GROUND_Y+20, logoX, GROUND_Y+28);
  ctx.bezierCurveTo(logoX+14, GROUND_Y+20, logoX+8, GROUND_Y+16, logoX, GROUND_Y+24);
  ctx.stroke();

  // Scrolling ice grain
  ctx.strokeStyle = 'rgba(200,80,180,0.06)'; ctx.lineWidth = 1;
  const scroll = (f*OBS_SPD*0.5)%70;
  for (let x = -scroll; x < W+10; x += 70) {
    ctx.beginPath(); ctx.moveTo(x, GROUND_Y+5); ctx.lineTo(x+35, GROUND_Y+28); ctx.stroke();
  }

  // Snowflakes
  for (const s of SNOWFLAKES) {
    ctx.globalAlpha = s.alpha*0.55;
    ctx.fillStyle = '#ffd0ff';
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Ice trail — pink sparkly
  for (const t of state.iceTrail) {
    ctx.globalAlpha = t.life*0.5;
    ctx.strokeStyle = '#ff88dd';
    ctx.lineWidth = 2.5; ctx.lineCap = 'round';
    ctx.shadowColor = '#ff44bb'; ctx.shadowBlur = 5;
    ctx.beginPath(); ctx.moveTo(t.x, t.y); ctx.lineTo(t.x-t.w, t.y+3); ctx.stroke();
    ctx.shadowBlur = 0;
  }
  ctx.globalAlpha = 1;

  // Obstacles
  for (const o of state.obstacles) {
    const botH = GROUND_Y-o.topH-OBS_GAP;
    drawObstacle(o.x, o.topH, true);
    drawObstacle(o.x, botH, false);
  }

  // Ribbons
  for (const r of state.ribbons) {
    ctx.globalAlpha = r.life;
    ctx.save();
    ctx.translate(r.x, r.y);
    ctx.rotate(r.angle);
    ctx.strokeStyle = `hsl(${r.hue},100%,70%)`;
    ctx.lineWidth = 2; ctx.lineCap = 'round';
    ctx.shadowColor = `hsl(${r.hue},100%,70%)`; ctx.shadowBlur = 6;
    ctx.beginPath(); ctx.moveTo(-r.len/2, 0); ctx.lineTo(r.len/2, 0); ctx.stroke();
    ctx.shadowBlur = 0;
    ctx.restore();
  }
  ctx.globalAlpha = 1;

  // Sparks
  for (const sp of state.sparks) {
    ctx.globalAlpha = sp.life;
    ctx.fillStyle = sp.color;
    ctx.shadowColor = sp.color; ctx.shadowBlur = 10;
    ctx.beginPath(); ctx.arc(sp.x, sp.y, sp.r, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;
  }
  ctx.globalAlpha = 1;

  // Sophia
  drawSophia(SOPHIA_X, state.cy, state.cvy, state.phase);

  // Score
  ctx.font = "bold 42px 'Comfortaa', cursive";
  ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.fillText(state.score, W/2+2, 55);
  ctx.fillStyle = '#ffffff';
  ctx.shadowColor = '#ff44cc'; ctx.shadowBlur = 20;
  ctx.fillText(state.score, W/2, 53);
  ctx.shadowBlur = 0;

  // === IDLE SCREEN ===
  if (state.phase === 'idle') {
    ctx.fillStyle = 'rgba(10,0,20,0.65)'; ctx.fillRect(0, 0, W, H);
    ctx.textAlign = 'center';

    const glow = ctx.createRadialGradient(W/2, 230, 0, W/2, 230, 180);
    glow.addColorStop(0, 'rgba(220,60,180,0.14)');
    glow.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = glow; ctx.fillRect(W/2-180, 120, 360, 240);

    // Decorative stars
    ctx.font = '22px serif'; ctx.fillStyle = 'rgba(255,180,255,0.5)';
    ctx.fillText('✦  ✦  ✦', W/2, 168);

    ctx.font = "bold 74px 'Comfortaa', cursive";
    ctx.fillStyle = '#ffffff';
    ctx.shadowColor = '#ff44cc'; ctx.shadowBlur = 35;
    ctx.fillText('Sophia', W/2, 228);

    ctx.font = "bold 36px 'Comfortaa', cursive";
    ctx.fillStyle = '#ff88dd';
    ctx.shadowColor = '#cc2299'; ctx.shadowBlur = 18;
    ctx.fillText('Skates', W/2, 272);
    ctx.shadowBlur = 0;

    ctx.font = "900 12px 'Nunito', sans-serif";
    ctx.fillStyle = 'rgba(255,150,220,0.5)';
    ctx.fillText('✦  ICE PRINCESS CHAMPION  ✦', W/2, 298);

    const pulse = Math.sin(f*0.08)*0.25+0.75;
    ctx.globalAlpha = pulse;
    ctx.fillStyle = '#fff';
    ctx.font = "700 16px 'Nunito', sans-serif";
    ctx.fillText('✦ TAP OR PRESS SPACE TO SKATE ✦', W/2, 348);
    ctx.globalAlpha = 1;

    if (state.best > 0) {
      ctx.fillStyle = '#ffd700';
      ctx.shadowColor = '#ffaa00'; ctx.shadowBlur = 10;
      ctx.font = "700 17px 'Nunito', sans-serif";
      ctx.fillText('🏆 BEST: '+state.best, W/2, 386);
      ctx.shadowBlur = 0;
    }
    ctx.fillStyle = 'rgba(255,130,210,0.28)';
    ctx.font = "700 12px 'Nunito', sans-serif";
    ctx.fillText('Sophia — Queen of the Ice ✦', W/2, 418);

    ctx.font = '20px serif'; ctx.fillStyle = 'rgba(255,180,255,0.3)';
    ctx.fillText('✦  ✦  ✦', W/2, 446);
  }

  // === DEAD SCREEN ===
  if (state.phase === 'dead' && state.deathTimer > 35) {
    ctx.fillStyle = 'rgba(10,0,20,0.75)';
    ctx.beginPath(); ctx.roundRect(45, 185, 330, 240, 16); ctx.fill();
    ctx.strokeStyle = 'rgba(255,100,220,0.45)'; ctx.lineWidth = 2;
    ctx.shadowColor = '#ff44cc'; ctx.shadowBlur = 14;
    ctx.stroke(); ctx.shadowBlur = 0;

    ctx.textAlign = 'center';
    ctx.font = "bold 28px 'Comfortaa', cursive";
    ctx.fillStyle = '#ff6699';
    ctx.shadowColor = '#ff0066'; ctx.shadowBlur = 16;
    ctx.fillText('Sophia took a tumble! 💫', W/2, 232);
    ctx.shadowBlur = 0;

    ctx.font = "bold 22px 'Nunito', sans-serif";
    ctx.fillStyle = '#ffd0ff';
    ctx.fillText('Score: '+state.score, W/2, 274);
    ctx.fillStyle = '#ffd700';
    ctx.shadowColor = '#ffaa00'; ctx.shadowBlur = 8;
    ctx.fillText('🏆 Best: '+state.best, W/2, 310);
    ctx.shadowBlur = 0;

    if (state.deathTimer > 70) {
      const p2 = Math.sin(f*0.1)*0.25+0.75;
      ctx.globalAlpha = p2;
      ctx.fillStyle = '#ff88dd';
      ctx.font = "700 15px 'Nunito', sans-serif";
      ctx.fillText('✦ TAP / SPACE TO TRY AGAIN ✦', W/2, 383);
      ctx.globalAlpha = 1;
    }
  }
}

function loop() { update(); draw(); requestAnimationFrame(loop); }
loop();
</script>
</body>
</html>
